services:
  # 1. Mosquitto MQTT Broker (รับ-ส่งข้อมูล)
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto_broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped
    networks:
      - iot-network

  # 2. Node-RED (ประมวลผลข้อมูล)
  node-red:
    image: nodered/node-red:latest
    container_name: node_red
    ports:
      - "1880:1880"
    volumes:
      - ./node-red-data:/data
    environment:
      - TZ=Asia/Bangkok
    restart: unless-stopped
    depends_on:
      - mosquitto
    networks:
      - iot-network

  # 3. InfluxDB (ฐานข้อมูล Time-Series เก็บข้อมูลเซ็นเซอร์)
  influxdb:
    image: influxdb:latest
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - ./influxdb-data:/var/lib/influxdb2
      - ./influxdb-config:/etc/influxdb2
    environment:
      - TZ=Asia/Bangkok
      # ตั้งค่าเริ่มต้นอัตโนมัติ (สามารถเปลี่ยนรหัสและ Token ได้ตามต้องการ)
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=iot_org
      - DOCKER_INFLUXDB_INIT_BUCKET=iot_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-auth-token
    restart: unless-stopped
    networks:
      - iot-network

  # 4. Grafana (แสดงผลกราฟและ Dashboard)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana-data:/var/lib/grafana
    environment:
      - TZ=Asia/Bangkok
      # ตั้งค่ารหัสผ่านเริ่มต้นสำหรับเข้า Grafana
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=adminpassword
    restart: unless-stopped
    depends_on:
      - influxdb
    networks:
      - iot-network

# สร้าง Network ภายใน
networks:
  iot-network:
    driver: bridge
